<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Probability calculator</title>
  <style>
    :root {
      --bg-body: #0b1220;
      --bg-card: #111827b8;
      --text-primary: #e5e7eb;
      --text-secondary: #94a3b8;
      --input-bg: #02061799;
      --border-light: #94a3b826;
      --accent: #38bdf8;
      --accent1: #6366f1;
      --accent2: #22c55e;
      --accent3: #38bdf8;
      --winner-row-bg: #34d3990f;
      --winner-row-border: #34d3992e;
      --table-hover-bg: #38bdf80a;
      --gradient-light-1: #fbbf241f;
      --gradient-light-2: #f973161a;
      --gradient-light-3: #eab30814;
      --light-card-bg: #fffffff0;
      --light-card-shadow: #00000014;
      --light-table-header-bg: #f1f5f9;
      --light-result-bg: #f8fafcf2;
      --light-result-border: #94a3b866;
      --light-winner-row-bg: #34d3991f;
      --light-winner-row-border: #34d39940;
      --error-color: #ef4444;
    }

    .light-mode {
      --bg-body: #f8fafc;
      --bg-card: var(--light-card-bg);
      --text-primary: #1e2937;
      --text-secondary: #64748b;
      --input-bg: #ffffff;
      --border-light: #94a3b859;
      --accent: #0ea5e9;
      --winner-row-bg: var(--light-winner-row-bg);
      --winner-row-border: var(--light-winner-row-border);
      --table-hover-bg: #0ea5e914;
    }

    * { box-sizing: border-box; margin: 0; }

    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      color: var(--text-primary);
      background: var(--bg-body);
      min-height: 100vh;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 20% 10%, #6366f12e, transparent 40%),
                  radial-gradient(circle at 80% 30%, #22c55e1f, transparent 45%),
                  radial-gradient(circle at 50% 90%, #38bdf81a, transparent 45%);
      pointer-events: none;
      z-index: -1;
    }

    .light-mode body::before {
      background: radial-gradient(circle at 20% 10%, var(--gradient-light-1), transparent 40%),
                  radial-gradient(circle at 80% 30%, var(--gradient-light-2), transparent 45%),
                  radial-gradient(circle at 50% 90%, var(--gradient-light-3), transparent 45%);
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 30px 20px;
      width: 100%;
    }

    h1 {
      text-align: center;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0 auto 18px;
      background: linear-gradient(90deg, var(--accent1), var(--accent2), var(--accent3));
      background-size: 300% 300%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradientShift 10s ease infinite;
      padding: 12px 24px;
      border-radius: 16px;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      backdrop-filter: blur(14px);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 18px;
      box-shadow: 0 10px 30px #00000059, inset 0 1px 0 #ffffff08;
    }

    .light-mode .card {
      backdrop-filter: none;
      background: var(--light-card-bg);
      box-shadow: 0 10px 30px var(--light-card-shadow);
    }

    .label {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 6px;
      font-weight: 600;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border-light);
      background: var(--input-bg);
      color: var(--text-primary);
      outline: none;
      transition: all 0.18s ease;
      font-weight: 500;
    }

    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px #38bdf81f; }
    .light-mode input:focus { box-shadow: 0 0 0 3px #0ea5e926; }

    input.invalid { border-color: var(--error-color); box-shadow: 0 0 0 3px #ef44441f; }

    button {
      background: #38bdf826;
      color: #7dd3fc;
      border: 1px solid #38bdf840;
      padding: 8px 14px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.15s;
      font-weight: 500;
    }

    .light-mode button {
      background: #0ea5e91f;
      color: #0c4a6e;
      border-color: #0ea5e966;
    }

    button:hover { background: #38bdf838; transform: translateY(-1px); }
    .light-mode button:hover { background: #0ea5e933; }

    .theme-btn, .lang-btn {
      background: #94a3b826;
      color: var(--text-primary);
      border: none;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      font-size: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px #00000033;
      margin-left: 8px;
    }

    .header-actions {
      position: absolute;
      top: 32px;
      right: 40px;
      z-index: 100;
      display: flex;
      gap: 8px;
    }

    .flex-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

    .event-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: nowrap;
      position: relative;
      transition: transform 0.2s;
      touch-action: pan-y;
    }

    .event-name { flex: 1.5; min-width: 120px; }

    .event-number { width: 80px; }

    .input-group {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .number-label {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 2px;
      white-space: nowrap;
    }

    .status-btns {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .status-btn {
      padding: 4px 0;
      width: 36px;
      text-align: center;
      background: #1e293b;
      color: #cbd5e1;
      border: 1px solid #475569;
      font-size: 16px;
      height: 40px;
    }

    .light-mode .status-btn { background: #e2e8f0; color: #0f172a; border-color: #94a3b8; }

    .status-btn.active-win { background: #22c55e; color: white; border-color: #16a34a; }
    .status-btn.active-lose { background: #ef4444; color: white; border-color: #dc2626; }
    .status-btn.active-pending { background: #fbbf24; color: #0f172a; border-color: #d97706; }

    .chance-badge {
      min-width: 70px;
      text-align: right;
      font-weight: 700;
      color: var(--accent);
    }

    .delete-event-btn {
      background: transparent;
      border: 1px solid var(--border-light);
      color: var(--text-secondary);
      width: 36px;
      height: 40px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      padding: 0;
    }

    .delete-event-btn:hover {
      background: #ef444433;
      color: #ef4444;
      border-color: #ef4444;
    }

    .group-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      flex-wrap: nowrap;
      gap: 8px;
    }

    .group-header > div:first-child {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: nowrap;
    }

    .group-header > div:last-child {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: nowrap;
    }

    .collapse-btn {
      background: transparent;
      border: 1px solid var(--border-light);
      padding: 4px 12px;
      white-space: nowrap;
    }

    .stats-card { margin-top: 24px; }
    .profile-selector { margin-bottom: 16px; }
    .error-message { color: #f87171; font-size: 13px; margin-top: 4px; }
    .warning-banner { background: #fbbf2426; border-left: 4px solid #fbbf24; padding: 10px; border-radius: 8px; margin: 12px 0; }
    .setup-section { margin-top: 16px; }
    .group-config-row { display: flex; gap: 10px; margin-bottom: 12px; align-items: flex-end; }
    .hidden { display: none !important; }

    .footer-note {
      margin-top: 24px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      background: linear-gradient(90deg, var(--accent1), var(--accent2), var(--accent3));
      background-size: 300% 300%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradientShift 10s ease infinite;
    }

    .top-stats-list { list-style: none; padding: 0; margin: 8px 0; }
    .top-stats-list li { padding: 4px 0; border-bottom: 1px dashed var(--border-light); }

    .export-import { display: flex; gap: 6px; margin-left: auto; }
    .group-chance-collapsed {
      font-size: 14px;
      font-weight: 500;
      color: var(--accent);
      margin-top: 4px;
    }

    .group-next-chance-collapsed {
      font-size: 14px;
      font-weight: 500;
      color: var(--accent);
      margin-top: 4px;
    }

    .group-next-chance {
      font-size: 14px;
      font-weight: 500;
      color: var(--accent);
      margin-top: 4px;
    }

    .group-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .summary-text {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .event-config-label {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 4px;
      font-weight: 600;
    }

    .mobile-menu-btn {
      display: none;
      background: #94a3b826;
      border: none;
      font-size: 24px;
      padding: 8px 16px;
    }

    .actions-menu {
      display: flex;
      gap: 8px;
      margin-left: auto;
    }

    .drag-handle {
      cursor: grab;
      font-size: 24px;
      padding: 0 8px;
      color: var(--text-secondary);
      user-select: none;
    }
    .drag-handle:active { cursor: grabbing; }

    .event-drag-handle {
      cursor: grab;
      font-size: 20px;
      padding: 0 4px;
      color: var(--text-secondary);
      user-select: none;
      display: flex;
      align-items: center;
    }
    .event-drag-handle:active { cursor: grabbing; }

    .edit-group-btn, .delete-group-btn, .group-stats-btn {
      width: 36px;
      height: 36px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      background: transparent;
      border: 1px solid var(--border-light);
      color: var(--text-secondary);
      font-size: 18px;
    }
    .edit-group-btn:hover, .delete-group-btn:hover, .group-stats-btn:hover {
      background: #38bdf826;
      color: var(--accent);
      border-color: var(--accent);
    }

    .scroll-group-btn {
      background: transparent;
      border: 1px solid var(--border-light);
      width: 32px;
      height: 32px;
      padding: 0;
      font-size: 18px;
      border-radius: 8px;
    }

    .bottom-scroll-buttons {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      justify-content: flex-end;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: #00000080;
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-content {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 20px;
      padding: 24px;
      max-width: 700px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 20px 40px #00000059;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .modal-close {
      background: transparent;
      border: none;
      font-size: 28px;
      cursor: pointer;
      color: var(--text-secondary);
      padding: 0 8px;
    }
    .stats-section {
      margin-bottom: 24px;
    }
    .stats-group-title {
      font-size: 1.2rem;
      font-weight: bold;
      margin-bottom: 8px;
      border-bottom: 1px solid var(--border-light);
      padding-bottom: 4px;
    }
    .stats-category {
      margin-left: 12px;
      margin-bottom: 12px;
    }
    .stats-category-title {
      font-weight: 600;
      margin-bottom: 4px;
    }
    .stats-item {
      display: flex;
      align-items: flex-start;
      padding: 6px 8px;
      border-radius: 6px;
      background: var(--input-bg);
      margin-bottom: 4px;
      gap: 12px;
      flex-wrap: wrap;
    }
    .stats-item-name {
      flex: 1 1 180px;
      font-weight: 500;
      word-break: break-word;
      min-width: 0;
    }
    .stats-item-numbers {
      flex: 0 0 auto;
      font-size: 0.9em;
      color: var(--text-secondary);
      white-space: nowrap;
    }
    .stats-item-probability {
      flex: 0 0 70px;
      text-align: right;
      font-weight: 600;
      white-space: nowrap;
    }
    .stats-item.win-status .stats-item-name { color: #22c55e; }
    .stats-item.lose-status .stats-item-name { color: #ef4444; }
    .stats-item.pending-status .stats-item-name { color: #fbbf24; }
    .light-mode .stats-item.win-status .stats-item-name { color: #16a34a; }
    .light-mode .stats-item.lose-status .stats-item-name { color: #dc2626; }
    .light-mode .stats-item.pending-status .stats-item-name { color: #d97706; }

    .autocomplete-wrapper {
      position: relative;
      flex: 1.5;
      min-width: 120px;
    }
    .autocomplete-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--input-bg);
      border: 1px solid var(--border-light);
      border-radius: 10px;
      max-height: 200px;
      overflow-y: auto;
      z-index: 100;
      box-shadow: 0 4px 12px #00000033;
      margin-top: 4px;
    }
    .autocomplete-item {
      padding: 8px 12px;
      cursor: pointer;
      border-bottom: 1px solid var(--border-light);
      color: var(--text-primary);
    }
    .autocomplete-item:last-child { border-bottom: none; }
    .autocomplete-item:hover, .autocomplete-item.selected {
      background: var(--accent);
      color: #0b1220;
    }

    @media (max-width: 768px) {
      .container { padding: 16px 12px; }
      .header-actions { top: 16px; right: 16px; }
      .event-row {
        flex-wrap: wrap;
        align-items: flex-start;
      }
      .event-name, .autocomplete-wrapper { flex: 1 1 100%; min-width: auto; }
      .event-number { width: 100%; }
      .status-btns { justify-content: center; }
      .delete-event-btn { margin-left: auto; }
      .actions-menu { display: none; flex-direction: column; position: absolute; background: var(--bg-card); border: 1px solid var(--border-light); border-radius: 12px; padding: 12px; right: 16px; top: 60px; z-index: 200; }
      .actions-menu.show { display: flex; }
      .mobile-menu-btn { display: inline-flex; }
      .card.flex-row { flex-wrap: wrap; }
      .group-header {
        flex-wrap: wrap;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <h1 id="main-title" data-i18n="app_title">Probability calculator</h1>
  
  <div class="header-actions">
    <button id="lang-en" class="lang-btn" aria-label="English">EN</button>
    <button id="lang-ru" class="lang-btn" aria-label="Русский">RU</button>
    <button id="theme-toggle" class="theme-btn" aria-label="Toggle theme">☀️</button>
  </div>

  <div id="setup-view">
    <div class="card">
      <div class="label" data-i18n="profile_section">Profile</div>
      <div class="profile-selector flex-row">
        <select id="profile-select" style="flex:1;"></select>
        <button id="load-profile-btn" data-i18n="load">Load</button>
        <button id="new-profile-btn" data-i18n="new_profile">New</button>
        <button id="delete-profile-btn" data-i18n="delete_profile">Delete</button>
      </div>
      <div class="export-import">
        <button id="export-profile-setup" data-i18n="export">Export</button>
        <button id="import-profile-setup" data-i18n="import">Import</button>
        <button id="backup-all-btn" data-i18n="backup_all">Backup All</button>
        <button id="restore-backup-btn" data-i18n="restore_backup">Restore Backup</button>
        <input type="file" id="import-file-setup" accept=".json" style="display:none;">
        <input type="file" id="restore-backup-file" accept=".json" style="display:none;">
      </div>
      <div id="new-profile-area" class="hidden">
        <input type="text" id="new-profile-name" placeholder="Profile name" data-i18n-placeholder="profile_name_placeholder">
        <div class="flex-row" style="margin-top:8px;">
          <button id="create-profile-confirm" data-i18n="create">Create</button>
          <button id="cancel-new-profile" data-i18n="cancel">Cancel</button>
        </div>
        <div id="profile-error" class="error-message"></div>
      </div>
    </div>

    <div id="groups-setup-card" class="card hidden">
      <div class="label" data-i18n="groups_setup">Event groups setup</div>
      <div class="setup-section">
        <div class="flex-row">
          <span data-i18n="how_many_groups">How many event groups?</span>
          <input type="number" id="groups-count" min="1" value="1" style="width:100px;">
          <button id="apply-groups-count" data-i18n="apply">Apply</button>
        </div>
        <div id="groups-count-warning" class="warning-banner hidden">
          <span data-i18n="many_groups_warning">More than 5 groups may reduce readability &amp; performance. Consider splitting it into multiple profiles.</span>
          <div class="flex-row" style="margin-top:8px;">
            <button id="continue-anyway" data-i18n="continue_anyway">Continue anyway</button>
            <button id="cancel-to-count" data-i18n="cancel">Cancel</button>
          </div>
        </div>
      </div>
      <div id="groups-config-container" class="setup-section"></div>
      <div class="flex-row" style="justify-content: space-between; margin-top: 16px;">
        <button id="add-group-row" data-i18n="add_group">+ Add group</button>
        <button id="create-calculator-btn" data-i18n="create_calculator">Create Calculator</button>
      </div>
      <div id="setup-error" class="error-message"></div>
    </div>
  </div>

  <div id="calculator-view" class="hidden">
    <div class="card flex-row" style="justify-content: space-between;">
      <span data-i18n="current_profile">Profile:</span>
      <strong id="current-profile-name"></strong>
      <button class="mobile-menu-btn" id="mobile-menu-toggle">☰</button>
      <div class="actions-menu" id="actions-menu">
        <button id="save-profile-calc" data-i18n="save">Save</button>
        <button id="export-profile-calc" data-i18n="export">Export</button>
        <button id="import-profile-calc" data-i18n="import">Import</button>
        <input type="file" id="import-file-calc" accept=".json" style="display:none;">
        <button id="load-filter-btn" data-i18n="load_filter">Load Filter</button>
        <input type="file" id="filter-file-input" accept=".json,.txt" style="display:none;">
        <button id="clear-filter-btn" data-i18n="clear_filter">Clear Filter</button>
        <button id="reset-calculator-btn" data-i18n="reset">Reset</button>
        <button id="back-to-setup" data-i18n="back_to_setup">← Setup</button>
      </div>
    </div>
    <div style="margin-bottom: 16px;">
      <button id="add-group-calc" data-i18n="add_group_calc">+ Add Group</button>
    </div>
    <div id="groups-container"></div>
    <div class="card stats-card">
      <div class="label" style="display: flex; justify-content: space-between; align-items: center;">
        <span data-i18n="summary_statistics">Summary statistics</span>
        <div style="display: flex; gap: 8px;">
          <button id="show-stats-modal-btn" data-i18n="stats_button">Stats</button>
          <button id="show-chance-modal-btn" data-i18n="chance_button">Chance</button>
        </div>
      </div>
      <div id="global-stats"></div>
    </div>
  </div>
  <div class="footer-note">Made by Ch1cWolf<br>2026 ©</div>
</div>

<script>
  (function(){
    "use strict";

    const i18n = {
      en: {
        app_title: 'Probability calculator',
        profile_section: 'Profile',
        load: 'Load',
        new_profile: 'New',
        delete_profile: 'Delete',
        export: 'Export',
        import: 'Import',
        backup_all: 'Backup All',
        restore_backup: 'Restore Backup',
        profile_name_placeholder: 'Profile name',
        create: 'Create',
        cancel: 'Cancel',
        groups_setup: 'Event groups setup',
        how_many_groups: 'How many event groups?',
        apply: 'Apply',
        many_groups_warning: 'More than 5 groups may reduce readability & performance. Consider splitting it into multiple profiles.',
        continue_anyway: 'Continue anyway',
        add_group: '+ Add group',
        add_group_calc: '+ Add Group',
        create_calculator: 'Create Calculator',
        update_calculator: 'Update Calculator',
        group_name_placeholder: 'Enter group name',
        events_label: 'Events',
        items_count_label: 'Number of events:',
        remove: 'Remove',
        current_profile: 'Profile:',
        back_to_setup: '← Setup',
        summary_statistics: 'Summary statistics',
        overall_expected_wins: 'Total expected wins:',
        total_wins: 'Total wins:',
        total_losses: 'Total losses:',
        pending_count: 'Pending:',
        top_names: 'Top event chances (pending/lose):',
        event_name_placeholder: 'Event name',
        entries: 'Entries',
        winners: 'Winners',
        group_expected_label: 'Expected wins:',
        collapse: 'Collapse',
        expand: 'Expand',
        duplicate_group_name: 'Group name already exists (case‑insensitive)',
        duplicate_profile: 'Profile already exists',
        fill_all_fields: 'Fill all group names and counts',
        profile_load_confirm: 'Load profile? Unsaved changes will be lost.',
        empty_profile_name: 'Profile name cannot be empty',
        group_name_required: 'Group name required',

    let currentLang = localStorage.getItem('lottery_lang') || 'en';

    function t(key) { return i18n[currentLang]?.[key] || key; }

    function applyLanguage(lang) {
      currentLang = lang;
      document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });
      document.querySelectorAll('[data-i18n-placeholder]').forEach(el => { el.placeholder = t(el.dataset.i18nPlaceholder); });
      document.getElementById('main-title').textContent = t('app_title');
      document.getElementById('lang-en').style.fontWeight = currentLang==='en'?'bold':'normal';
      document.getElementById('lang-ru').style.fontWeight = currentLang==='ru'?'bold':'normal';
      localStorage.setItem('lottery_lang', lang);
      if (!document.getElementById('calculator-view').classList.contains('hidden')) {
        renderCalculator();
      }
      if (!document.getElementById('setup-view').classList.contains('hidden')) {
        if (!document.getElementById('groups-setup-card').classList.contains('hidden')) {
          renderGroupsConfig(pendingGroupsConfig.length);
        }
        updateCreateButtonText();
      }
    }

    const STORAGE_KEY = 'lottery_profiles_v2';
    const THEME_KEY = 'lotteryTheme';

    let profiles = {};
    let currentProfile = null;
    let currentGroups = [];
    let collapsedGroups = new Set();
    let pendingGroupsConfig = [];
    let filterSet = new Set();

    function loadProfiles() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) { try { profiles = JSON.parse(saved); } catch(e) { profiles = {}; } }
      else { profiles = {}; }
    }

    function saveProfiles() { localStorage.setItem(STORAGE_KEY, JSON.stringify(profiles)); }
    
    function saveCurrentProfile() {
      if (!currentProfile) return;
      profiles[currentProfile] = { groups: currentGroups, collapsedGroups: Array.from(collapsedGroups) };
      saveProfiles();
    }
    
    function loadProfile(name) {
      if (!profiles[name]) return false;
      currentProfile = name;
      const data = profiles[name];
      currentGroups = JSON.parse(JSON.stringify(data.groups || []));
      collapsedGroups = new Set(data.collapsedGroups || []);
      document.getElementById('current-profile-name').textContent = name;
      return true;
    }

    function formatPercent(value) { return value <= 0 ? "0.00" : (value * 100).toFixed(2); }
    function formatNumber(value) { return value.toFixed(2); }
    function calcTotalChance(probs) { return 1 - probs.reduce((prod, p) => prod * (1 - p), 1); }

    function calcGroupNextChance(group) {
      let relevantProbs = [];
      for (const ev of group.events) {
        if (ev.status === 'win') {
          relevantProbs = [];
        } else if (ev.status === 'lose' && !isFiltered(ev.name)) {
          const p = ev.participants > 0 ? ev.winners / ev.participants : 0;
          relevantProbs.push(p);
        }
      }
      return relevantProbs.length > 0 ? calcTotalChance(relevantProbs) : 0;
    }

    function calcOverallNextChance() {
      let allRelevantProbs = [];
      currentGroups.forEach(group => {
        let groupProbs = [];
        for (const ev of group.events) {
          if (ev.status === 'win') {
            groupProbs = [];
          } else if (ev.status === 'lose' && !isFiltered(ev.name)) {
            const p = ev.participants > 0 ? ev.winners / ev.participants : 0;
            groupProbs.push(p);
          }
        }
        allRelevantProbs = allRelevantProbs.concat(groupProbs);
      });
      return allRelevantProbs.length > 0 ? calcTotalChance(allRelevantProbs) : 0;
    }

    function initTheme() {
      const saved = localStorage.getItem(THEME_KEY);
      const btn = document.getElementById('theme-toggle');
      if (saved === 'light') { document.body.classList.add('light-mode'); btn.textContent = '🌙'; }
      else if (saved === 'dark') { document.body.classList.remove('light-mode'); btn.textContent = '☀️'; }
      else { applySystemTheme(); }
      btn.addEventListener('click', () => {
        const isLight = document.body.classList.toggle('light-mode');
        btn.textContent = isLight ? '🌙' : '☀️';
        localStorage.setItem(THEME_KEY, isLight ? 'light' : 'dark');
      });
      window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', () => {
        if (!localStorage.getItem(THEME_KEY)) applySystemTheme();
      });
    }

    function applySystemTheme() {
      const prefers = window.matchMedia('(prefers-color-scheme: light)').matches;
      document.body.classList.toggle('light-mode', prefers);
      document.getElementById('theme-toggle').textContent = prefers ? '🌙' : '☀️';
    }

    function populateProfileSelect() {
      const select = document.getElementById('profile-select');
      select.innerHTML = '';
      Object.keys(profiles).forEach(name => {
        const opt = document.createElement('option');
        opt.value = name; opt.textContent = name;
        select.appendChild(opt);
      });
    }

      const btn = document.getElementById('create-calculator-btn');
      btn.textContent = (currentProfile && currentGroups && currentGroups.length > 0) ? t('update_calculator') : t('create_calculator');
    }

    function renderGroupsConfig(count) {
      const container = document.getElementById('groups-config-container');
      if (!pendingGroupsConfig.length || pendingGroupsConfig.length !== count) {
        pendingGroupsConfig = Array.from({length: count}, (_,i) => ({ id: Date.now()+i, name: '', itemsCount: 1 }));
      }
      container.innerHTML = '';
      pendingGroupsConfig.forEach((g, idx) => {
        const div = document.createElement('div');
        div.className = 'group-config-row';
        div.innerHTML = `
          <input type="text" class="group-name-input" placeholder="${t('group_name_placeholder')}" value="${g.name}" data-index="${idx}" style="flex:2">
          <div style="display:flex; flex-direction:column;">
            <span class="event-config-label">${t('events_label')}</span>
            <input type="number" class="group-items-input" min="1" value="${g.itemsCount}" data-index="${idx}" style="width:80px;">
          </div>
          <button class="remove-group-btn" data-index="${idx}">${t('remove')}</button>
        `;
        container.appendChild(div);
      });
      container.querySelectorAll('.group-name-input').forEach(inp => inp.addEventListener('input', e => {
        pendingGroupsConfig[inp.dataset.index].name = inp.value;
      }));
      container.querySelectorAll('.group-items-input').forEach(inp => inp.addEventListener('change', e => {
        const idx = inp.dataset.index;
        pendingGroupsConfig[idx].itemsCount = Math.max(1, parseInt(inp.value) || 1);
        inp.value = pendingGroupsConfig[idx].itemsCount;
      }));
      container.querySelectorAll('.remove-group-btn').forEach(btn => btn.addEventListener('click', e => {
        pendingGroupsConfig.splice(btn.dataset.index, 1);
        renderGroupsConfig(pendingGroupsConfig.length);
      }));
    }

    function validateGroupNamesUnique() {
      const names = pendingGroupsConfig.map(g => g.name.trim().toLowerCase()).filter(n => n);
      return new Set(names).size === names.length;
    }

    function getUniqueEventNames() {
      const namesSet = new Set();
      currentGroups.forEach(group => {
        group.events.forEach(ev => {
          if (ev.name && ev.name.trim()) namesSet.add(ev.name.trim());
        });
      });
      return [...namesSet].sort();
    }

    function attachAutocomplete(inputElement, row) {
      const wrapper = document.createElement('div');
      wrapper.className = 'autocomplete-wrapper';
      inputElement.parentNode.insertBefore(wrapper, inputElement);
      wrapper.appendChild(inputElement);
      
      const dropdown = document.createElement('div');
      dropdown.className = 'autocomplete-dropdown hidden';
      wrapper.appendChild(dropdown);
      
      let selectedIndex = -1;
      
      function filterOptions(query) {
        const names = getUniqueEventNames();
        if (!query) return [];
        const lowerQuery = query.toLowerCase();
        return names.filter(name => 
          name.toLowerCase().startsWith(lowerQuery) && 
          name.toLowerCase() !== lowerQuery
        );
      }
      
      function renderDropdown() {
        const query = inputElement.value.trim();
        const options = filterOptions(query);
        if (options.length === 0) {
          dropdown.classList.add('hidden');
          return;
        }
        dropdown.innerHTML = '';
        options.forEach((opt, idx) => {
          const item = document.createElement('div');
          item.className = 'autocomplete-item';
          item.textContent = opt;
          item.dataset.value = opt;
          item.addEventListener('click', () => {
            inputElement.value = opt;
            dropdown.classList.add('hidden');
            inputElement.dispatchEvent(new Event('input', { bubbles: true }));
          });
          dropdown.appendChild(item);
        });
        dropdown.classList.remove('hidden');
        selectedIndex = -1;
      }
      
      inputElement.addEventListener('input', () => {
        renderDropdown();
      });
      
      inputElement.addEventListener('focus', () => {
        renderDropdown();
      });
      
      inputElement.addEventListener('blur', () => {
        setTimeout(() => dropdown.classList.add('hidden'), 150);
      });
      
      inputElement.addEventListener('keydown', (e) => {
        const items = dropdown.querySelectorAll('.autocomplete-item');
        if (dropdown.classList.contains('hidden') || items.length === 0) return;
        
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          selectedIndex = Math.min(selectedIndex + 1, items.length - 1);
          items.forEach((item, idx) => {
            item.classList.toggle('selected', idx === selectedIndex);
          });
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          selectedIndex = Math.max(selectedIndex - 1, 0);
          items.forEach((item, idx) => {
            item.classList.toggle('selected', idx === selectedIndex);
          });
        } else if (e.key === 'Enter' && selectedIndex >= 0) {
          e.preventDefault();
          items[selectedIndex].click();
        } else if (e.key === 'Escape') {
          dropdown.classList.add('hidden');
        }
      });
      
      document.addEventListener('click', (e) => {
        if (!wrapper.contains(e.target)) {
          dropdown.classList.add('hidden');
        }
      });
    }

    function renderCalculator() {
      const container = document.getElementById('groups-container');
      container.innerHTML = '';
      currentGroups.forEach((group, gIdx) => {
        const card = createGroupCard(group, gIdx);
        container.appendChild(card);
      });

      const nextChance = calcGroupNextChance(group);

      const showScrollButtons = eventCount >= 10;

      card.innerHTML = `

        </div>

          ${t('group_expected_label')} ${winCount} / ${formatNumber(expected)}
        </div>
        <div class="group-next-chance-collapsed" style="${isCollapsed ? '' : 'display:none;'}">
          ${t('next_chance_group')} ${formatPercent(nextChance)}%
        </div>
        <div class="group-content" style="${isCollapsed ? 'display:none;' : ''}">
          <div class="events-list"></div>
          <div class="total group-total-chance">${t('group_expected_label')} <span>${winCount} / ${formatNumber(expected)}</span></div>
          <div class="total group-next-chance">${t('next_chance_group')} <span>${formatPercent(nextChance)}%</span></div>
          <div class="group-actions">
            <button class="add-event-btn" data-group-idx="${gIdx}">${t('add_event')}</button>
          </div>
          ${showScrollButtons ? `
            <div class="bottom-scroll-buttons">
              <button class="scroll-group-btn scroll-top-btn" data-group-idx="${gIdx}" title="${t('scroll_to_top')}">⬆️</button>
              <button class="scroll-group-btn scroll-bottom-btn" data-group-idx="${gIdx}" title="${t('scroll_to_bottom')}">⬇️</button>
            </div>
          ` : ''}
        </div>
      `;
      const eventsDiv = card.querySelector('.events-list');
      group.events.forEach((ev, eIdx) => {
        eventsDiv.appendChild(createEventRow(ev, gIdx, eIdx));
      });
      
      const dragHandle = card.querySelector('.drag-handle');
      dragHandle.addEventListener('mousedown', (e) => handleGroupDragStart(e, card, gIdx));
      
      return card;
    }

    function createEventRow(ev, gIdx, eIdx) {
      const row = document.createElement('div');
      row.className = 'event-row';
      row.dataset.groupIdx = gIdx;
      row.dataset.eventIdx = eIdx;
      const p = ev.participants > 0 ? ev.winners / ev.participants : 0;
      row.innerHTML = `
        <span class="event-drag-handle" title="${t('drag_handle')}">☰</span>
        <div class="autocomplete-wrapper">
          <input type="text" class="event-name" value="${ev.name}" placeholder="${t('event_name_placeholder')}" autocomplete="off">
          <div class="autocomplete-dropdown hidden"></div>
        </div>
        <div class="input-group">
          <span class="number-label">${t('entries')}</span>
          <input type="number" class="event-number participants" value="${ev.participants}" min="1" placeholder="${t('entries')}">

          <button class="status-btn ${ev.status==='win'?'active-win':''}" data-status="win">✅</button>

      `;

      attachAutocomplete(nameInput, row);
      validateWinners(row);
      
      const dragHandle = row.querySelector('.event-drag-handle');
      dragHandle.addEventListener('mousedown', (e) => handleEventDragStart(e, row, gIdx, eIdx));
      
      return row;
    }

    function validateWinners(row) {
      const participantsInput = row.querySelector('.participants');
      const winnersInput = row.querySelector('.winners');
      const participants = parseInt(participantsInput.value) || 1;
      const winners = parseInt(winnersInput.value) || 0;
      const isValid = winners <= participants;
      winnersInput.classList.toggle('invalid', !isValid);
      return isValid;
    }

    function calcGroupExpected(group) {
      return group.events
        .filter(ev => ev.status === 'lose' && !isFiltered(ev.name))
        .reduce((sum, ev) => sum + (ev.participants > 0 ? ev.winners / ev.participants : 0), 0);
    }

    function isFiltered(eventName) {
      if (!eventName || filterSet.size === 0) return false;
      return filterSet.has(eventName.trim());
    }

    function updateGroupCard(card, group) {
      const gIdx = parseInt(card.dataset.groupIdx);
      const expected = calcGroupExpected(group);
      const winCount = group.events.filter(ev => ev.status === 'win').length;
      const nextChance = calcGroupNextChance(group);
      const chanceSpan = card.querySelector('.group-total-chance span');
      if (chanceSpan) chanceSpan.textContent = `${winCount} / ${formatNumber(expected)}`;
      const collapsedSpan = card.querySelector('.group-chance-collapsed');
      if (collapsedSpan) collapsedSpan.textContent = `${t('group_expected_label')} ${winCount} / ${formatNumber(expected)}`;
      const nextCollapsedSpan = card.querySelector('.group-next-chance-collapsed');
      if (nextCollapsedSpan) nextCollapsedSpan.textContent = `${t('next_chance_group')} ${formatPercent(nextChance)}%`;
      const nextChanceSpan = card.querySelector('.group-next-chance span');
      if (nextChanceSpan) nextChanceSpan.textContent = `${formatPercent(nextChance)}%`;
      const eventsDiv = card.querySelector('.events-list');
      eventsDiv.innerHTML = '';
      group.events.forEach((ev, eIdx) => {
        const row = createEventRow(ev, gIdx, eIdx);
        eventsDiv.appendChild(row);
      });
      
      const headerDiv = card.querySelector('.group-header div:last-child');
      const existingScrollBtns = headerDiv.querySelectorAll('.scroll-group-btn');
      existingScrollBtns.forEach(btn => btn.remove());
      const bottomDiv = card.querySelector('.bottom-scroll-buttons');
      if (bottomDiv) bottomDiv.remove();
      
      const showScrollButtons = group.events.length >= 10;
      const isCollapsed = collapsedGroups.has(group.id);
      if (showScrollButtons) {
        const topBtn = document.createElement('button');
        topBtn.className = 'scroll-group-btn scroll-top-btn';
        topBtn.dataset.groupIdx = gIdx;
        topBtn.title = t('scroll_to_top');
        topBtn.textContent = '⬆️';
        topBtn.style.display = isCollapsed ? 'none' : '';
        const bottomBtn = document.createElement('button');
        bottomBtn.className = 'scroll-group-btn scroll-bottom-btn';
        bottomBtn.dataset.groupIdx = gIdx;
        bottomBtn.title = t('scroll_to_bottom');
        bottomBtn.textContent = '⬇️';
        bottomBtn.style.display = isCollapsed ? 'none' : '';
        headerDiv.insertBefore(bottomBtn, headerDiv.firstChild);
        headerDiv.insertBefore(topBtn, headerDiv.firstChild);
        
        const contentDiv = card.querySelector('.group-content');
        const actionsDiv = card.querySelector('.group-actions');
        const newBottomDiv = document.createElement('div');
        newBottomDiv.className = 'bottom-scroll-buttons';
        newBottomDiv.innerHTML = `
          <button class="scroll-group-btn scroll-top-btn" data-group-idx="${gIdx}" title="${t('scroll_to_top')}">⬆️</button>
          <button class="scroll-group-btn scroll-bottom-btn" data-group-idx="${gIdx}" title="${t('scroll_to_bottom')}">⬇️</button>
        `;
        actionsDiv.insertAdjacentElement('afterend', newBottomDiv);
      }
    }

    function updateAllStats() {
      currentGroups.forEach((group, idx) => {
        const card = document.querySelector(`#groups-container .card[data-group-idx="${idx}"]`);
        if (card) updateGroupCard(card, group);
      });
      updateGlobalStats();
    }

    let groupDragState = {
      active: false,
      startY: 0,
      sourceCard: null,
      sourceIdx: -1,
      placeholder: null,
      clone: null
    };

    function handleGroupDragStart(e, card, idx) {
      if (e.button !== 0) return;
      e.preventDefault();
      const rect = card.getBoundingClientRect();
      groupDragState.active = true;
      groupDragState.startY = e.clientY;
      groupDragState.sourceCard = card;
      groupDragState.sourceIdx = idx;
      
      groupDragState.clone = card.cloneNode(true);
      groupDragState.clone.classList.add('dragging-clone');
      groupDragState.clone.style.position = 'fixed';
      groupDragState.clone.style.width = rect.width + 'px';
      groupDragState.clone.style.left = rect.left + 'px';
      groupDragState.clone.style.top = rect.top + 'px';
      groupDragState.clone.style.opacity = '0.7';
      groupDragState.clone.style.zIndex = '1000';
      groupDragState.clone.style.pointerEvents = 'none';
      document.body.appendChild(groupDragState.clone);
      
      groupDragState.placeholder = document.createElement('div');
      groupDragState.placeholder.className = 'card';
      groupDragState.placeholder.style.background = 'var(--border-light)';
      groupDragState.placeholder.style.opacity = '0.5';
      groupDragState.placeholder.style.border = '2px dashed var(--accent)';
      groupDragState.placeholder.style.height = rect.height + 'px';
      card.parentNode.insertBefore(groupDragState.placeholder, card);
      card.style.display = 'none';
      
      window.addEventListener('mousemove', handleGroupDragMove);
      window.addEventListener('mouseup', handleGroupDragEnd);
    }

    function handleGroupDragMove(e) {
      if (!groupDragState.active) return;
      e.preventDefault();
      const clone = groupDragState.clone;
      clone.style.top = (e.clientY - 20) + 'px';
      
      const elements = document.elementsFromPoint(e.clientX, e.clientY);
      const targetCard = elements.find(el => el.classList && el.classList.contains('card') && el !== groupDragState.sourceCard && el !== groupDragState.placeholder);
      if (targetCard && targetCard.parentNode === groupDragState.sourceCard.parentNode) {
        const container = document.getElementById('groups-container');
        const children = [...container.children].filter(c => c.classList.contains('card') && c !== groupDragState.sourceCard);
        const targetIndex = children.indexOf(targetCard);
        const currentPlaceholderIndex = children.indexOf(groupDragState.placeholder);
        if (currentPlaceholderIndex !== targetIndex) {
          if (currentPlaceholderIndex < targetIndex) {
            container.insertBefore(groupDragState.placeholder, targetCard.nextSibling);
          } else {
            container.insertBefore(groupDragState.placeholder, targetCard);
          }
        }
      }
    }

    function handleGroupDragEnd(e) {
      if (!groupDragState.active) return;
      window.removeEventListener('mousemove', handleGroupDragMove);
      window.removeEventListener('mouseup', handleGroupDragEnd);
      
      const container = document.getElementById('groups-container');
      const children = [...container.children].filter(c => c.classList.contains('card'));
      const placeholderIdx = children.indexOf(groupDragState.placeholder);
      
      if (groupDragState.clone) groupDragState.clone.remove();
      groupDragState.sourceCard.style.display = '';
      groupDragState.placeholder.remove();
      
      if (placeholderIdx !== -1 && placeholderIdx !== groupDragState.sourceIdx) {
        const movedGroup = currentGroups.splice(groupDragState.sourceIdx, 1)[0];
        currentGroups.splice(placeholderIdx, 0, movedGroup);
        saveCurrentProfile();
        renderCalculator();
      }
      
      groupDragState = { active: false };
    }

    let eventDragState = {
      active: false,
      groupIdx: -1,
      sourceIdx: -1,
      sourceRow: null,
      placeholder: null,
      clone: null
    };

    function handleEventDragStart(e, row, gIdx, eIdx) {
      if (e.button !== 0) return;
      e.preventDefault();
      const rect = row.getBoundingClientRect();
      eventDragState.active = true;
      eventDragState.groupIdx = gIdx;
      eventDragState.sourceIdx = eIdx;
      eventDragState.sourceRow = row;
      
      eventDragState.clone = row.cloneNode(true);
      eventDragState.clone.classList.add('dragging-clone');
      eventDragState.clone.style.position = 'fixed';
      eventDragState.clone.style.width = rect.width + 'px';
      eventDragState.clone.style.left = rect.left + 'px';
      eventDragState.clone.style.top = rect.top + 'px';
      eventDragState.clone.style.opacity = '0.7';
      eventDragState.clone.style.zIndex = '1000';
      eventDragState.clone.style.pointerEvents = 'none';
      document.body.appendChild(eventDragState.clone);
      
      eventDragState.placeholder = document.createElement('div');
      eventDragState.placeholder.className = 'event-row';
      eventDragState.placeholder.style.background = 'var(--border-light)';
      eventDragState.placeholder.style.opacity = '0.5';
      eventDragState.placeholder.style.border = '2px dashed var(--accent)';
      eventDragState.placeholder.style.height = rect.height + 'px';
      row.parentNode.insertBefore(eventDragState.placeholder, row);
      row.style.display = 'none';
      
      window.addEventListener('mousemove', handleEventDragMove);
      window.addEventListener('mouseup', handleEventDragEnd);
    }

    function handleEventDragMove(e) {
      if (!eventDragState.active) return;
      e.preventDefault();
      const clone = eventDragState.clone;
      clone.style.top = (e.clientY - 20) + 'px';
      
      const elements = document.elementsFromPoint(e.clientX, e.clientY);
      const targetRow = elements.find(el => el.classList && el.classList.contains('event-row') && el !== eventDragState.sourceRow && el !== eventDragState.placeholder && el.closest('.card') === eventDragState.sourceRow.closest('.card'));
      if (targetRow) {
        const list = eventDragState.sourceRow.parentNode;
        const rows = [...list.children].filter(c => c.classList.contains('event-row'));
        const targetIndex = rows.indexOf(targetRow);
        const placeholderIndex = rows.indexOf(eventDragState.placeholder);
        if (placeholderIndex !== targetIndex) {
          if (placeholderIndex < targetIndex) {
            list.insertBefore(eventDragState.placeholder, targetRow.nextSibling);
          } else {
            list.insertBefore(eventDragState.placeholder, targetRow);
          }
        }
      }
    }

    function handleEventDragEnd(e) {
      if (!eventDragState.active) return;
      window.removeEventListener('mousemove', handleEventDragMove);
      window.removeEventListener('mouseup', handleEventDragEnd);
      
      const list = eventDragState.sourceRow.parentNode;
      const rows = [...list.children].filter(c => c.classList.contains('event-row'));
      const placeholderIdx = rows.indexOf(eventDragState.placeholder);
      
      if (eventDragState.clone) eventDragState.clone.remove();
      eventDragState.sourceRow.style.display = '';
      eventDragState.placeholder.remove();
      
      if (placeholderIdx !== -1 && placeholderIdx !== eventDragState.sourceIdx) {
        const group = currentGroups[eventDragState.groupIdx];
        const movedEvent = group.events.splice(eventDragState.sourceIdx, 1)[0];
        group.events.splice(placeholderIdx, 0, movedEvent);
        saveCurrentProfile();
        const card = document.querySelector(`#groups-container .card[data-group-idx="${eventDragState.groupIdx}"]`);
        if (card) updateGroupCard(card, group);
        updateGlobalStats();
      }
      
      eventDragState = { active: false };
    }

    function handleCalculatorClick(e) {
      const target = e.target;
      const card = target.closest('.card');
      if (!card) return;
      const gIdx = parseInt(card.dataset.groupIdx);
      const group = currentGroups[gIdx];

      if (target.classList.contains('collapse-btn')) {
        const id = Number(target.dataset.groupId);
        const content = card.querySelector('.group-content');
        const collapsedChance = card.querySelector('.group-chance-collapsed');
        const nextCollapsedChance = card.querySelector('.group-next-chance-collapsed');
        const headerScrollBtns = card.querySelectorAll('.group-header .scroll-group-btn');
        if (collapsedGroups.has(id)) {
          collapsedGroups.delete(id);
          content.style.display = '';
          collapsedChance.style.display = 'none';
          nextCollapsedChance.style.display = 'none';
          target.textContent = t('collapse');
          headerScrollBtns.forEach(btn => btn.style.display = '');
        } else {
          collapsedGroups.add(id);
          content.style.display = 'none';
          collapsedChance.style.display = '';
          nextCollapsedChance.style.display = '';
          target.textContent = t('expand');
          headerScrollBtns.forEach(btn => btn.style.display = 'none');
        }
        saveCurrentProfile();
        return;
      }

      if (target.classList.contains('scroll-top-btn')) {
        const eventsDiv = card.querySelector('.events-list');
        if (eventsDiv.firstChild) eventsDiv.firstChild.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        return;
      }
      if (target.classList.contains('scroll-bottom-btn')) {
        const eventsDiv = card.querySelector('.events-list');
        if (eventsDiv.lastChild) eventsDiv.lastChild.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        return;
      }

      if (target.classList.contains('edit-group-btn')) {
        const nameSpan = card.querySelector('.group-name-text');
        const currentName = group.name;
        const input = document.createElement('input');
        input.type = 'text';
        input.value = currentName;
        input.style.fontSize = '1.2rem';
        input.style.fontWeight = 'bold';
        input.style.padding = '4px 8px';
        input.style.width = 'auto';
        input.style.minWidth = '150px';
        nameSpan.replaceWith(input);
        input.focus();
        input.select();
        const saveRename = () => {
          let newName = input.value.trim();
          if (!newName) {
            alert(t('empty_group_name'));
            input.replaceWith(nameSpan);
            return;
          }
          const lowerNew = newName.toLowerCase();
          const duplicate = currentGroups.some((g, idx) => idx !== gIdx && g.name.toLowerCase() === lowerNew);
          if (duplicate) {
            alert(t('duplicate_group_name_exists'));
            input.replaceWith(nameSpan);
            return;
          }
          group.name = newName;
          saveCurrentProfile();
          const newSpan = document.createElement('span');
          newSpan.className = 'group-name-text';
          newSpan.style.fontSize = '1.2rem';
          newSpan.style.fontWeight = 'bold';
          newSpan.textContent = newName;
          input.replaceWith(newSpan);
          const collapsedChance = card.querySelector('.group-chance-collapsed');
          if (collapsedChance) {
            const expected = calcGroupExpected(group);
            const winCount = group.events.filter(ev => ev.status === 'win').length;
            collapsedChance.textContent = `${t('group_expected_label')} ${winCount} / ${formatNumber(expected)}`;
          }
        };
        input.addEventListener('blur', saveRename);
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            e.preventDefault();
            input.blur();
          }
          if (e.key === 'Escape') {
            input.replaceWith(nameSpan);
          }
        });
        return;
      }

      if (target.classList.contains('delete-group-btn')) {
        if (!confirm(t('delete_group_confirm').replace('{name}', group.name))) return;
        currentGroups.splice(gIdx, 1);
        collapsedGroups.delete(group.id);
        saveCurrentProfile();
        renderCalculator();
        return;
      }

      if (target.classList.contains('group-stats-btn')) {
        showStatsModal(gIdx);
        return;
      }

      if (target.classList.contains('add-event-btn')) {
        group.events.push({ name: '', participants: 1, winners: 0, status: 'pending' });
        saveCurrentProfile();
        updateGroupCard(card, group);
        updateGlobalStats();
        return;
      }

      if (target.classList.contains('delete-event-btn')) {
        const row = target.closest('.event-row');
        const eIdx = parseInt(row.dataset.eventIdx);
        const ev = group.events[eIdx];
        const isDefault = ev.name === '' && ev.participants === 1 && ev.winners === 0 && ev.status === 'pending';
        if (!isDefault && !confirm(t('remove_event_confirm'))) return;
        group.events.splice(eIdx, 1);
        saveCurrentProfile();
        updateGroupCard(card, group);
        updateGlobalStats();
        return;
      }

      if (target.classList.contains('status-btn')) {
        const row = target.closest('.event-row');
        const eIdx = parseInt(row.dataset.eventIdx);
        const status = target.dataset.status;
        group.events[eIdx].status = status;
        saveCurrentProfile();
        updateGroupCard(card, group);
        updateGlobalStats();
        return;
      }
    }

    function handleCalculatorInput(e) {
      const target = e.target;
      if (!target.matches('.event-name, .event-number')) return;
      const row = target.closest('.event-row');
      const card = row.closest('.card');
      const gIdx = parseInt(card.dataset.groupIdx);
      const eIdx = parseInt(row.dataset.eventIdx);
      const group = currentGroups[gIdx];
      const ev = group.events[eIdx];
      
      if (target.classList.contains('event-name')) {
        ev.name = target.value;
      } else {
        const field = target.classList.contains('participants') ? 'participants' : 'winners';
        let val = parseInt(target.value) || 0;
        if (field === 'participants') val = Math.max(1, val);
        else val = Math.max(0, val);
        target.value = val;
        ev[field] = val;
        validateWinners(row);
      }
      const p = ev.participants > 0 ? ev.winners / ev.participants : 0;
      row.querySelector('.chance-badge').textContent = `${formatPercent(p)}%`;
      saveCurrentProfile();
      const expected = calcGroupExpected(group);
      const winCount = group.events.filter(ev => ev.status === 'win').length;
      card.querySelector('.group-total-chance span').textContent = `${winCount} / ${formatNumber(expected)}`;
      card.querySelector('.group-chance-collapsed').textContent = `${t('group_expected_label')} ${winCount} / ${formatNumber(expected)}`;
      updateGlobalStats();
    }

    function updateGlobalStats() {
      const allEvents = currentGroups.flatMap(g => g.events);
      const loseEvents = allEvents.filter(ev => ev.status === 'lose' && !isFiltered(ev.name));
      const totalExpected = loseEvents.reduce((sum, ev) => sum + (ev.participants > 0 ? ev.winners / ev.participants : 0), 0);
      const totalWins = allEvents.filter(ev => ev.status === 'win').length;
      const totalLosses = allEvents.filter(ev => ev.status === 'lose').length;
      const pending = allEvents.filter(ev => ev.status === 'pending').length;
      const overallNextChance = calcOverallNextChance();

      const nameMap = new Map();
      const consideredForTop = allEvents.filter(ev => ev.status !== 'win' && !isFiltered(ev.name));
      consideredForTop.forEach(ev => {
        if (!ev.name.trim()) return;
        const key = ev.name.trim();
        if (filterSet.has(key)) return;
        if (!nameMap.has(key)) nameMap.set(key, []);
        nameMap.get(key).push(ev.participants>0 ? ev.winners/ev.participants : 0);
      });
      let topEntries = [];
      for (let [name, arr] of nameMap.entries()) {
        topEntries.push({ name, chance: calcTotalChance(arr) });
      }
      topEntries.sort((a,b) => b.chance - a.chance);
      const top3 = topEntries.slice(0,3);

      document.getElementById('global-stats').innerHTML = `
        <p class="summary-text">${t('overall_chance')} <strong>${formatPercent(overallNextChance)}%</strong></p>
        <p class="summary-text">${t('overall_expected_wins')} <strong>${totalWins} / ${formatNumber(totalExpected)}</strong></p>
        <p class="summary-text">${t('total_wins')} ${totalWins} · ${t('total_losses')} ${totalLosses} · ${t('pending_count')} ${pending}</p>
        <div class="summary-text">${t('top_names')}</div>
        <ul class="top-stats-list">
          ${top3.map(item => `<li><strong>${item.name}</strong> — ${formatPercent(item.chance)}%</li>`).join('')}
          ${top3.length === 0 ? '<li>—</li>' : ''}
        </ul>
      `;
    }

    function showChanceModal() {
      const loseEvents = currentGroups.flatMap(g => g.events).filter(ev => ev.status === 'lose' && !isFiltered(ev.name));
      if (loseEvents.length === 0) {
        alert(t('no_lose_events'));
        return;
      }
      
      const nameMap = new Map();
      loseEvents.forEach(ev => {
        const name = ev.name.trim();
        if (!name) return;
        if (!nameMap.has(name)) nameMap.set(name, []);
        nameMap.get(name).push(ev.participants > 0 ? ev.winners / ev.participants : 0);
      });
      
      const entries = [];
      for (let [name, probs] of nameMap.entries()) {
        entries.push({ name, chance: calcTotalChance(probs) });
      }
      entries.sort((a,b) => b.chance - a.chance);
      
      let html = `
        <div class="modal-content">
          <div class="modal-header">
            <h2>${t('chance_modal_title')}</h2>
            <button class="modal-close">✖</button>
          </div>
          <div style="max-height: 70vh; overflow-y: auto;">
      `;
      entries.forEach(entry => {
        html += `
          <div class="stats-item lose-status">
            <span class="stats-item-name">${entry.name || '—'}</span>
            <span class="stats-item-probability">${formatPercent(entry.chance)}%</span>
          </div>
        `;
      });
      html += `</div></div>`;
      
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = html;
      document.body.appendChild(overlay);
      
      overlay.querySelector('.modal-close').addEventListener('click', () => overlay.remove());
      overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
    }

    function showStatsModal(groupIndex = null) {
      const groupsToShow = (groupIndex !== null) ? [currentGroups[groupIndex]] : currentGroups;
      
      let html = `<div class="modal-content"><div class="modal-header"><h2>${t('statistics_title')}</h2><button class="modal-close">✖</button></div>`;
      
      groupsToShow.forEach(group => {
        const events = group.events;
        const winEvents = events.filter(ev => ev.status === 'win');
        const pendingEvents = events.filter(ev => ev.status === 'pending');
        const loseEvents = events.filter(ev => ev.status === 'lose');
        
        const sortByProb = (a,b) => (b.participants>0 ? b.winners/b.participants : 0) - (a.participants>0 ? a.winners/a.participants : 0);
        winEvents.sort(sortByProb);
        pendingEvents.sort(sortByProb);
        loseEvents.sort(sortByProb);
        
        html += `<div class="stats-section"><div class="stats-group-title">${group.name}</div>`;
        
        const renderCategory = (title, arr, statusClass) => {
          if (arr.length === 0) return '';
          let catHtml = `<div class="stats-category"><div class="stats-category-title">${title}</div>`;
          arr.forEach(ev => {
            const prob = ev.participants>0 ? ev.winners/ev.participants : 0;
            catHtml += `
              <div class="stats-item ${statusClass}">
                <span class="stats-item-name">${ev.name || '—'}</span>
                <span class="stats-item-numbers">${t('entries_short')}: ${ev.participants}  ${t('winners_short')}: ${ev.winners}</span>
                <span class="stats-item-probability">${formatPercent(prob)}%</span>
              </div>
            `;
          });
          catHtml += `</div>`;
          return catHtml;
        };
        
        html += renderCategory(t('win_section'), winEvents, 'win-status');
        html += renderCategory(t('pending_section'), pendingEvents, 'pending-status');
        html += renderCategory(t('lose_section'), loseEvents, 'lose-status');
        html += `</div>`;
      });
      
      html += `</div>`;
      
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = html;
      document.body.appendChild(overlay);
      
      overlay.querySelector('.modal-close').addEventListener('click', () => overlay.remove());
      overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
    }

    function addNewGroup() {
      if (currentGroups.length >= 5) {
        if (!confirm(t('many_groups_warning'))) return;
      }
      const newGroup = {
        id: Date.now() + Math.random(),
        name: t('new_group_default'),
        itemsCount: 1,
        events: [{ name: '', participants: 1, winners: 0, status: 'pending' }]
      };
      currentGroups.unshift(newGroup);
      saveCurrentProfile();
      renderCalculator();
    }

    function setupHotkeys() {
      document.addEventListener('keydown', e => {
        if (e.target.tagName === 'INPUT') {
          if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
            e.preventDefault();
            const row = e.target.closest('.event-row');
            if (!row) return;
            const card = row.closest('.card');
            const rows = [...card.querySelectorAll('.event-row')];
            const idx = rows.indexOf(row);
            const nextIdx = e.key === 'ArrowUp' ? idx - 1 : idx + 1;
            if (nextIdx >= 0 && nextIdx < rows.length) {
              const nextInput = rows[nextIdx].querySelector(`.${e.target.classList[0]}`);
              if (nextInput) nextInput.focus();
            }
          }
          if (e.ctrlKey && e.key === 'Enter') {
            e.preventDefault();
            const card = e.target.closest('.card');
            if (card) {
              const gIdx = card.dataset.groupIdx;
              const group = currentGroups[gIdx];
              group.events.push({ name: '', participants: 1, winners: 0, status: 'pending' });
              saveCurrentProfile();
              updateGroupCard(card, group);
              updateGlobalStats();
            }
          }
        }
      });
    }

    function setupSwipe() {
      let touchStartX = 0;
      document.addEventListener('touchstart', e => {
        const row = e.target.closest('.event-row');
        if (row) touchStartX = e.touches[0].clientX;
      }, {passive: true});
      document.addEventListener('touchend', e => {
        const row = e.target.closest('.event-row');
        if (!row) return;
        const touchEndX = e.changedTouches[0].clientX;
        const diff = touchStartX - touchEndX;
        if (diff > 70) {
          const card = row.closest('.card');
          const gIdx = parseInt(card.dataset.groupIdx);
          const eIdx = parseInt(row.dataset.eventIdx);
          const group = currentGroups[gIdx];
          const ev = group.events[eIdx];
          const isDefault = ev.name === '' && ev.participants === 1 && ev.winners === 0 && ev.status === 'pending';
          if (!isDefault && !confirm(t('remove_event_confirm'))) return;
          group.events.splice(eIdx, 1);
          saveCurrentProfile();
          updateGroupCard(card, group);
          updateGlobalStats();
        }
      });
    }

    function backupAllProfiles() {
      const data = JSON.stringify(profiles);
      const blob = new Blob([data], {type: 'application/json'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `lottery_backup_${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      alert(t('backup_success'));
    }

    function restoreBackup(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const imported = JSON.parse(e.target.result);
          profiles = imported;
          saveProfiles();
          populateProfileSelect();
          alert(t('restore_success'));
        } catch { alert('Invalid backup file'); }
      };
      reader.readAsText(file);
    }

    function exportProfile() {
      if (!currentProfile) { alert('No profile selected'); return; }
      const data = JSON.stringify(profiles[currentProfile], null, 2);
      const blob = new Blob([data], {type: 'application/json'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `${currentProfile}.json`;
      a.click();
    }

    function importProfile(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const imported = JSON.parse(e.target.result);
          if (!imported.groups) throw new Error('Invalid profile');
          const fileName = file.name.replace(/\.json$/i, '');
          const importedName = fileName.trim();
          if (!importedName) throw new Error('Invalid file name');
          
          const existingProfile = Object.keys(profiles).find(p => p === importedName);
          if (existingProfile) {
            if (confirm(t('import_overwrite_confirm').replace('{name}', existingProfile))) {
              profiles[existingProfile] = imported;
              saveProfiles();
              populateProfileSelect();
              if (confirm(t('import_overwrite_success').replace('{name}', existingProfile))) {
                loadProfile(existingProfile);
                showCalculator();
              }
            } else {
              alert(t('import_cancelled'));
            }
          } else {
            profiles[importedName] = imported;
            saveProfiles();
            populateProfileSelect();
            if (confirm(t('import_success_load').replace('{name}', importedName))) {
              loadProfile(importedName);
              showCalculator();
            }
          }
        } catch(err) {
          alert('Invalid file');
        }
      };
      reader.readAsText(file);
    }

    function loadFilterFile(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const content = e.target.result;
          let items = [];
          if (file.name.endsWith('.json')) {
            const json = JSON.parse(content);
            items = Array.isArray(json) ? json : [];
          } else {
            items = content.split(/\r?\n/).map(s => s.trim()).filter(s => s.length > 0);
          }
          filterSet = new Set(items);
          alert(t('filter_loaded').replace('{count}', filterSet.size));
          updateAllStats();
        } catch {
          alert(t('invalid_filter_file'));
        }
      };
      reader.readAsText(file);
    }

    function clearFilter() {
      filterSet.clear();
      alert(t('filter_cleared'));
      updateAllStats();
    }

    function init() {
      initTheme();
      loadProfiles();
      applyLanguage(currentLang);
      
      document.getElementById('lang-en').addEventListener('click', ()=> applyLanguage('en'));
      document.getElementById('lang-ru').addEventListener('click', ()=> applyLanguage('ru'));
      
      populateProfileSelect();
      showSetup();
      
      document.getElementById('new-profile-btn').addEventListener('click', ()=>{
        document.getElementById('new-profile-area').classList.remove('hidden');
        document.getElementById('new-profile-name').value = '';
      });
      document.getElementById('cancel-new-profile').addEventListener('click', ()=> document.getElementById('new-profile-area').classList.add('hidden'));
      document.getElementById('create-profile-confirm').addEventListener('click', ()=>{
        const name = document.getElementById('new-profile-name').value.trim();
        if (!name) { document.getElementById('profile-error').textContent = t('empty_profile_name'); return; }
        if (Object.keys(profiles).some(p => p.toLowerCase() === name.toLowerCase())) {
          document.getElementById('profile-error').textContent = t('duplicate_profile'); return;
        }
        profiles[name] = { groups: [], collapsedGroups: [] };
        saveProfiles();
        currentProfile = name;
        currentGroups = [];
        populateProfileSelect();
        document.getElementById('new-profile-area').classList.add('hidden');
        document.getElementById('groups-setup-card').classList.remove('hidden');
        document.getElementById('groups-count').value = 1;
        pendingGroupsConfig = [];
        renderGroupsConfig(1);
        updateCreateButtonText();
      });
      
      document.getElementById('delete-profile-btn').addEventListener('click', ()=>{
        const name = document.getElementById('profile-select').value;
        if (!name) return;
        if (!confirm(t('delete_profile_confirm').replace('{name}', name))) return;
        delete profiles[name];
        saveProfiles();
        if (currentProfile === name) currentProfile = null;
        populateProfileSelect();
        if (Object.keys(profiles).length === 0) {
          document.getElementById('groups-setup-card').classList.add('hidden');
        }
        updateCreateButtonText();
      });
      
      document.getElementById('load-profile-btn').addEventListener('click', ()=>{
        const name = document.getElementById('profile-select').value;
        if (!name) return;
        if (currentProfile && currentProfile !== name && !confirm(t('profile_load_confirm'))) return;
        if (loadProfile(name)) {
          document.getElementById('groups-setup-card').classList.add('hidden');
          showCalculator();
        }
      });
      
      document.getElementById('apply-groups-count').addEventListener('click', ()=>{
        let count = parseInt(document.getElementById('groups-count').value) || 1;
        if (count > 5) {
          document.getElementById('groups-count-warning').classList.remove('hidden');
        } else {
          renderGroupsConfig(count);
          document.getElementById('groups-setup-card').classList.remove('hidden');
        }
      });
      document.getElementById('continue-anyway').addEventListener('click', ()=>{
        let count = parseInt(document.getElementById('groups-count').value) || 1;
        renderGroupsConfig(count);
        document.getElementById('groups-count-warning').classList.add('hidden');
      });
      document.getElementById('cancel-to-count').addEventListener('click', ()=>{
        document.getElementById('groups-count-warning').classList.add('hidden');
      });
      document.getElementById('add-group-row').addEventListener('click', ()=>{
        pendingGroupsConfig.push({ id: Date.now()+Math.random(), name: '', itemsCount: 1 });
        renderGroupsConfig(pendingGroupsConfig.length);
      });
      
      document.getElementById('create-calculator-btn').addEventListener('click', ()=>{
        if (!currentProfile) { alert('Select or create profile first'); return; }
        const valid = pendingGroupsConfig.every(g => g.name.trim() && g.itemsCount>0);
        if (!valid) { document.getElementById('setup-error').textContent = t('fill_all_fields'); return; }
        if (!validateGroupNamesUnique()) { document.getElementById('setup-error').textContent = t('duplicate_group_name'); return; }

        const isUpdate = currentGroups && currentGroups.length > 0;
        let proceed = true;
        if (isUpdate) {
          for (let i = 0; i < pendingGroupsConfig.length; i++) {
            const newCfg = pendingGroupsConfig[i];
            const oldGroup = currentGroups[i];
            if (oldGroup && newCfg.itemsCount < oldGroup.events.length) {
              if (!confirm(t('event_count_reduced_confirm').replace('{group}', newCfg.name))) {
                proceed = false;
                break;
              }
            }
          }
        }
        if (!proceed) return;

        currentGroups = pendingGroupsConfig.map((g, idx) => {
          const oldGroup = currentGroups[idx];
          const events = oldGroup ? oldGroup.events.slice(0, g.itemsCount) : [];
          while (events.length < g.itemsCount) {
            events.push({ name: '', participants: 1, winners: 0, status: 'pending' });
          }
          return {
            id: g.id,
            name: g.name.trim(),
            itemsCount: g.itemsCount,
            events: events
          };
        });

        saveCurrentProfile();
        populateProfileSelect();
        showCalculator();
        updateCreateButtonText();
      });
      
      document.getElementById('back-to-setup').addEventListener('click', ()=>{
        if (currentProfile && profiles[currentProfile]) {
          pendingGroupsConfig = currentGroups.map(g => ({ id: g.id, name: g.name, itemsCount: g.itemsCount }));
          document.getElementById('groups-count').value = pendingGroupsConfig.length;
        }
        showSetup();
        document.getElementById('groups-setup-card').classList.remove('hidden');
        renderGroupsConfig(pendingGroupsConfig.length);
        updateCreateButtonText();
      });
      
      document.getElementById('reset-calculator-btn').addEventListener('click', ()=>{
        if (confirm(t('reset_confirm'))) {
          currentGroups.forEach(group => {
            group.events.forEach(ev => {
              ev.name = '';
              ev.participants = 1;
              ev.winners = 0;
              ev.status = 'pending';
            });
          });
          saveCurrentProfile();
          renderCalculator();
        }
      });
      
      function setupExportImport(exportBtnId, importBtnId, fileInputId) {
        document.getElementById(exportBtnId).addEventListener('click', exportProfile);
        document.getElementById(importBtnId).addEventListener('click', ()=> document.getElementById(fileInputId).click());
        document.getElementById(fileInputId).addEventListener('change', e => {
          if (e.target.files[0]) { importProfile(e.target.files[0]); e.target.value = ''; }
        });
      }
      setupExportImport('export-profile-setup', 'import-profile-setup', 'import-file-setup');
      setupExportImport('export-profile-calc', 'import-profile-calc', 'import-file-calc');
      
      document.getElementById('save-profile-calc').addEventListener('click', ()=>{
        saveCurrentProfile();
        alert('Profile saved.');
      });
      
      const groupsContainer = document.getElementById('groups-container');
      groupsContainer.addEventListener('click', handleCalculatorClick);
      groupsContainer.addEventListener('input', handleCalculatorInput);
      
      document.getElementById('add-group-calc').addEventListener('click', addNewGroup);
      
      document.getElementById('mobile-menu-toggle').addEventListener('click', ()=>{
        document.getElementById('actions-menu').classList.toggle('show');
      });
      
      document.getElementById('backup-all-btn').addEventListener('click', backupAllProfiles);
      document.getElementById('restore-backup-btn').addEventListener('click', ()=> document.getElementById('restore-backup-file').click());
      document.getElementById('restore-backup-file').addEventListener('change', e => {
        if (e.target.files[0]) { restoreBackup(e.target.files[0]); e.target.value = ''; }
      });
      
      document.getElementById('show-stats-modal-btn').addEventListener('click', ()=> showStatsModal());
      document.getElementById('show-chance-modal-btn').addEventListener('click', showChanceModal);
      
      document.getElementById('load-filter-btn').addEventListener('click', ()=> document.getElementById('filter-file-input').click());
      document.getElementById('filter-file-input').addEventListener('change', e => {
        if (e.target.files[0]) { loadFilterFile(e.target.files[0]); e.target.value = ''; }
      });
      document.getElementById('clear-filter-btn').addEventListener('click', clearFilter);
      
      setupHotkeys();
      setupSwipe();
      
      window.addEventListener('beforeunload', e => {
        if (currentProfile) saveCurrentProfile();
      });
    }

    init();
  })();
</script>
</body>
</html>
